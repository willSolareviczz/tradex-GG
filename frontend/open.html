<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrir Caixa - tradexGG</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/roulette.css">
</head>
<body>

  <!-- Case Opening Hero -->
  <div class="open-hero" id="open-hero">
    <div class="open-hero-bg" id="open-hero-bg"></div>
    <div class="open-hero-content">
      <!-- Case Image — center stage -->
      <div class="open-case-visual" id="open-case-visual">
        <div class="loading">Carregando...</div>
      </div>
      <!-- Meta + Controls -->
      <div class="open-case-meta" id="open-case-meta" style="display:none">
        <div class="open-case-label">CAIXA &middot; ABERTURA</div>
        <h1 class="open-case-title" id="open-case-title"></h1>
        <div class="open-case-price" id="open-case-price"></div>
        <!-- Controls: qty + open btn + fast mode -->
        <div class="open-controls-row">
          <div class="open-qty-selector" id="qty-selector">
            <button class="qty-btn active" data-qty="1">1</button>
            <button class="qty-btn" data-qty="2">2</button>
            <button class="qty-btn" data-qty="3">3</button>
            <button class="qty-btn" data-qty="4">4</button>
            <button class="qty-btn" data-qty="5">5</button>
            <button class="qty-btn" data-qty="10">10</button>
          </div>
          <button class="open-btn" id="open-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-14 9V3z"/></svg>
            ABRIR CAIXA
          </button>
          <label class="fast-mode-label">
            <div class="fast-mode-toggle">
              <input type="checkbox" id="fast-mode-check">
              <span class="fast-mode-slider"></span>
            </div>
            <span class="fast-mode-text">Fast mode</span>
          </label>
        </div>
        <!-- Keyboard shortcuts bar -->
        <div class="open-shortcuts-bar">
          <div class="shortcut-item"><span>ABRIR</span><kbd>ENTER</kbd></div>
          <div class="shortcut-item"><span>PARAR</span><kbd>SPACE</kbd></div>
          <div class="shortcut-item"><span>VENDER</span><kbd>S</kbd></div>
          <div class="shortcut-item"><span>REPETIR</span><kbd>R</kbd></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Multi-results grid (shown after opening) -->
  <div class="open-results-section" id="results-section" style="display:none">
    <div class="container">
      <div class="open-results-header">
        <h3 id="results-title">Resultados</h3>
        <div class="open-results-actions">
          <button class="open-results-sell-all" id="sell-all-btn">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Vender Todos
          </button>
          <button class="open-results-repeat" id="repeat-btn">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Repetir
          </button>
        </div>
      </div>
      <div class="open-results-grid" id="results-grid"></div>
    </div>
  </div>

  <!-- Multi-Roulette Section (compact tracks for qty > 1) -->
  <div class="multi-roulette-section" id="multi-roulette-section" style="display:none">
    <div class="multi-roulette-tracks" id="multi-roulette-tracks"></div>
  </div>

  <!-- Roulette Section -->
  <div class="open-roulette-section" id="roulette-section" style="display:none">
    <div class="roulette-wrapper" id="roulette-wrapper">
      <!-- Side fade overlays -->
      <div class="roulette-fade-left"></div>
      <div class="roulette-fade-right"></div>
      <!-- Center indicator -->
      <div class="roulette-indicator">
        <div class="roulette-indicator-line"></div>
        <div class="roulette-indicator-arrow-top"></div>
        <div class="roulette-indicator-arrow-bot"></div>
      </div>
      <div class="roulette-strip" id="roulette-strip"></div>
    </div>
  </div>

  <!-- Possible Skins Section -->
  <div class="container">
    <div class="possible-skins" id="possible-skins" style="display:none">
      <div class="possible-skins-header">
        <h3>Itens Possíveis</h3>
        <div class="possible-skins-sort" id="skins-sort-tabs">
          <button class="skins-sort-btn active" data-sort="price">Por Valor</button>
          <button class="skins-sort-btn" data-sort="chance">Por Chance</button>
          <button class="skins-sort-btn" data-sort="rarity">Por Raridade</button>
        </div>
      </div>
      <div class="possible-skins-grid" id="skins-grid"></div>
    </div>
  </div>

  <!-- Result Popup -->
  <div class="result-popup" id="result-popup">
    <div class="result-backdrop" id="result-backdrop"></div>
    <div class="result-content" id="result-content">
      <div class="result-rarity-glow" id="result-glow"></div>
      <img id="result-img" class="result-skin-img" src="" alt="">
      <div id="result-name" class="result-skin-name"></div>
      <div class="result-skin-meta">
        <span id="result-rarity" class="result-skin-rarity"></span>
        <span id="result-wear" class="wear-badge"></span>
        <span id="result-price" class="result-skin-price"></span>
      </div>
      <div class="result-actions">
        <button class="btn btn-secondary result-btn-keep" id="btn-keep">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Guardar
        </button>
        <button class="btn btn-sell" id="btn-sell">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Vender
        </button>
      </div>
      <button class="btn-open-again" id="btn-open-again">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Abrir Novamente
      </button>
    </div>
  </div>

  <!-- Skin Info Modal -->
  <div class="skin-info-modal" id="skin-info-modal">
    <div class="skin-info-backdrop" onclick="closeSkinInfo()"></div>
    <div class="skin-info-content">
      <button class="skin-info-close" onclick="closeSkinInfo()">×</button>
      <div class="skin-info-img-wrap">
        <img id="skin-info-img" class="skin-info-img" src="" alt="">
      </div>
      <div class="skin-info-name" id="skin-info-name"></div>
      <table class="skin-info-table">
        <thead>
          <tr><th>Wear</th><th>Preço</th><th>Drops</th></tr>
        </thead>
        <tbody id="skin-info-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/roulette.js"></script>
</body>
</html>
