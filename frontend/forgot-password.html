<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - tradexGG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-container">
    <div class="card">
      <h2>Recuperar Senha</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">
        Informe seu email cadastrado e enviaremos um link para criar uma nova senha.
      </p>

      <div id="success-msg" style="display:none; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); border-radius: 8px; padding: 1rem; color: var(--accent); font-size: 0.9rem; text-align: center; margin-bottom: 1rem;"></div>

      <form id="forgot-form" style="display:block;">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com" autofocus>
        </div>
        <div class="form-error" id="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="submit-btn">
          Enviar link de recuperação
        </button>
      </form>

      <div class="form-footer" style="margin-top: 1.2rem;">
        <a href="/login.html" style="color: var(--text-secondary); font-size: 0.85rem;">← Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('form-error');
      const successEl = document.getElementById('success-msg');

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const data = await apiFetch('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email }),
        });

        document.getElementById('forgot-form').style.display = 'none';
        successEl.style.display = 'block';
        successEl.textContent = data.message || 'Email enviado! Verifique sua caixa de entrada.';
      } catch (err) {
        errorEl.textContent = err.message || 'Erro ao enviar. Tente novamente.';
        btn.disabled = false;
        btn.textContent = 'Enviar link de recuperação';
      }
    });
  </script>
</body>
</html>
