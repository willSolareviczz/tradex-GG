<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha - tradexGG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-container">
    <div class="card" id="card-form">
      <h2>Criar Nova Senha</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">
        Escolha uma senha forte com pelo menos 6 caracteres.
      </p>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">Nova Senha</label>
          <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" autofocus>
        </div>
        <div class="form-group">
          <label for="password2">Confirmar Senha</label>
          <input type="password" id="password2" name="password2" required placeholder="Repita a nova senha">
        </div>
        <div class="form-error" id="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="submit-btn">
          Salvar Nova Senha
        </button>
      </form>
    </div>

    <!-- Token inválido ou expirado -->
    <div class="card" id="card-invalid" style="display:none; text-align:center;">
      <div style="font-size: 2rem; margin-bottom: 1rem;">⚠️</div>
      <h2 style="margin-bottom: 0.8rem;">Link inválido</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">
        Este link expirou ou já foi utilizado. Solicite um novo link de recuperação.
      </p>
      <a href="/forgot-password.html" class="btn btn-primary">Solicitar novo link</a>
    </div>

    <!-- Sucesso -->
    <div class="card" id="card-success" style="display:none; text-align:center;">
      <div style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent);">✓</div>
      <h2 style="margin-bottom: 0.8rem;">Senha alterada!</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">
        Sua senha foi atualizada com sucesso.
      </p>
      <a href="/login.html" class="btn btn-primary">Fazer Login</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('card-form').style.display = 'none';
      document.getElementById('card-invalid').style.display = 'block';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('form-error');

      errorEl.textContent = '';

      if (password !== password2) {
        errorEl.textContent = 'As senhas não coincidem.';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        await apiFetch('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });

        document.getElementById('card-form').style.display = 'none';
        document.getElementById('card-success').style.display = 'block';
      } catch (err) {
        if (err.message && err.message.includes('inválido')) {
          document.getElementById('card-form').style.display = 'none';
          document.getElementById('card-invalid').style.display = 'block';
        } else {
          errorEl.textContent = err.message || 'Erro ao salvar senha.';
          btn.disabled = false;
          btn.textContent = 'Salvar Nova Senha';
        }
      }
    });
  </script>
</body>
</html>
