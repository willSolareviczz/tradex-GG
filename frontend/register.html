<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - tradexGG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-container">
    <div class="card">
      <h2>Criar Conta</h2>
      <form id="auth-form" data-type="register">
        <div class="form-group">
          <label for="username">Nome de usuário</label>
          <input type="text" id="username" name="username" required placeholder="Seu username" minlength="3" maxlength="32">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
        </div>
        <div class="form-error" id="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Cadastrar</button>
      </form>
      <div class="form-footer">
        Já tem conta? <a href="/login.html">Entrar</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
