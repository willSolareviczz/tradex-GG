<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - tradexGG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-container">
    <div class="card">
      <h2>Entrar</h2>
      <form id="auth-form" data-type="login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required placeholder="Sua senha">
        </div>
        <div class="form-error" id="form-error"></div>
        <div style="text-align: right; margin-bottom: 0.5rem;">
          <a href="/forgot-password.html" style="font-size: 0.8rem; color: var(--text-secondary);">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.25rem;">Entrar</button>
      </form>
      <div class="form-footer">
        Não tem conta? <a href="/register.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
