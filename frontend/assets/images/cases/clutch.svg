<svg xmlns="http://www.w3.org/2000/svg" width="512" height="360" viewBox="0 0 512 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140808"/>
      <stop offset="50%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#120505"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eb4b4b;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#eb4b4b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#eb4b4b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="weapon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6060"/>
      <stop offset="50%" style="stop-color:#eb4b4b"/>
      <stop offset="100%" style="stop-color:#aa2222"/>
    </linearGradient>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eb4b4b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#aa2222;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <clipPath id="caseClip">
      <rect x="30" y="40" width="452" height="240" rx="12"/>
    </clipPath>
  </defs>

  <rect width="512" height="360" fill="url(#bg)" rx="16"/>

  <!-- Background crosshair pattern -->
  <g opacity="0.06">
    <circle cx="256" cy="160" r="80" fill="none" stroke="#eb4b4b" stroke-width="1"/>
    <circle cx="256" cy="160" r="50" fill="none" stroke="#eb4b4b" stroke-width="0.8"/>
    <circle cx="256" cy="160" r="20" fill="none" stroke="#eb4b4b" stroke-width="0.5"/>
    <line x1="256" y1="60" x2="256" y2="260" stroke="#eb4b4b" stroke-width="0.5"/>
    <line x1="156" y1="160" x2="356" y2="160" stroke="#eb4b4b" stroke-width="0.5"/>
  </g>

  <ellipse cx="256" cy="155" rx="180" ry="100" fill="#eb4b4b" opacity="0.04" filter="url(#softGlow)"/>

  <g clip-path="url(#caseClip)">
    <rect x="30" y="40" width="452" height="240" rx="12" fill="url(#caseGrad)"/>

    <!-- Blood splatter effect -->
    <g opacity="0.06">
      <circle cx="350" cy="100" r="25" fill="#eb4b4b"/>
      <circle cx="360" cy="90" r="15" fill="#eb4b4b"/>
      <circle cx="340" cy="110" r="10" fill="#eb4b4b"/>
      <circle cx="150" cy="200" r="20" fill="#eb4b4b"/>
      <circle cx="160" cy="210" r="12" fill="#eb4b4b"/>
    </g>

    <!-- Shotgun (Nova/MAG-7) silhouette -->
    <g transform="translate(70, 75) scale(0.9)" filter="url(#neon)">
      <path d="M30,95 L30,82 L45,78 L55,74 L70,70 L100,66 L140,62 L180,60 L220,58 L260,57 L300,57 L330,58 L350,60 L360,55 L365,52 L370,55 L368,62 L360,66 L350,68 L330,70 L300,72 L270,73 L240,74 L210,76 L180,78 L150,80 L120,83 L100,86 L80,90 L65,95 L55,100 L50,105 L45,108 L40,105 L35,100 Z"
            fill="url(#weapon)" opacity="0.65"/>
      <!-- Pump -->
      <rect x="150" y="68" width="80" height="8" rx="3" fill="#eb4b4b" opacity="0.35"/>
      <!-- Stock -->
      <path d="M30,82 L25,80 L15,82 L10,90 L12,98 L20,100 L30,95 Z"
            fill="url(#weapon)" opacity="0.5"/>
    </g>

    <!-- Particles -->
    <circle cx="100" cy="80" r="2.5" fill="#eb4b4b" opacity="0.6">
      <animate attributeName="cy" values="80;55;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="130" r="1.5" fill="#ff6060" opacity="0.5">
      <animate attributeName="cy" values="130;105;130" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="230" r="1.5" fill="#eb4b4b" opacity="0.4">
      <animate attributeName="cy" values="230;210;230" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="210" r="1" fill="#eb4b4b" opacity="0.3">
      <animate attributeName="cy" values="210;195;210" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="30" y="40" width="452" height="240" rx="12" fill="none" stroke="#eb4b4b" stroke-width="2" opacity="0.45"/>
  <line x1="60" y1="40" x2="452" y2="40" stroke="url(#glow1)" stroke-width="2"/>
  <line x1="60" y1="280" x2="452" y2="280" stroke="url(#glow1)" stroke-width="1.5"/>

  <path d="M30,60 L30,40 L50,40" fill="none" stroke="#eb4b4b" stroke-width="3" opacity="0.8"/>
  <path d="M482,60 L482,40 L462,40" fill="none" stroke="#eb4b4b" stroke-width="3" opacity="0.8"/>
  <path d="M30,260 L30,280 L50,280" fill="none" stroke="#eb4b4b" stroke-width="3" opacity="0.8"/>
  <path d="M482,260 L482,280 L462,280" fill="none" stroke="#eb4b4b" stroke-width="3" opacity="0.8"/>

  <rect x="166" y="295" width="180" height="50" rx="8" fill="#140808" stroke="#eb4b4b" stroke-width="1" opacity="0.9"/>
  <text x="256" y="318" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="22" fill="#eb4b4b" letter-spacing="4" filter="url(#neon)">CLUTCH</text>
  <text x="256" y="336" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="400" font-size="10" fill="#8b949e" letter-spacing="3">CASE</text>
</svg>